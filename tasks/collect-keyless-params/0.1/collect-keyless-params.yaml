apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: collect-keyless-params
  annotations:
    tekton.dev/displayName: Collect Keyless Signing Parameters
    tekton.dev/pipelines.minVersion: "0.12.1"
    tekton.dev/tags: ec, keyless, signing, configuration
  labels:
    app.kubernetes.io/version: "0.1"

spec:
  description: |
    Tekton task to collect Konflux configuration parameters related to
    keyless signing using cosign. The task attempts to read the "cluster-config"
    ConfigMap in the "konflux-info" namespace to extract signing parameters.

    In case the ConfigMap is not found, the task will output empty strings for all parameters,
    allowing the pipeline to continue without signing parameters.

  params:
    - name: configMapName
      type: string
      description: The name of the ConfigMap to read signing parameters from
      default: cluster-config

    - name: configMapNamespace
      type: string
      description: The namespace where the ConfigMap is located
      default: konflux-info

  results:
    - name: keylessSigningEnabled
      type: string
      description: |
        A flag indicating whether keyless signing is enabled based on the presence of signing parameters.

    - name: defaultOIDCIssuer
      type: string
      description: |
        A default OIDC issuer URL to be used for signing.

    - name: buildIdentityRegexp
      type: string
      description: |
        A regular expression to extract build identity from the OIDC token claims, if applicable.

    - name: tektonChainsIdentity
      type: string
      description: |
        The Tekton Chains identity from the OIDC token claims, if applicable.

    - name: fulcioUrl
      type: string
      description: |
        The URL of the Fulcio certificate authority.

    - name: rekorUrl
      type: string
      description: |
        The URL of the Rekor transparency log.

    - name: tufUrl
      type: string
      description: |
        The URL of the TUF repository.

  stepTemplate:
    securityContext:
      runAsUser: 1001

  steps:
    - name: collect-signing-params
      image: quay.io/conforma/cli:latest

      computeResources:
        limits:
          memory: 128Mi
          cpu: 50m
        requests:
          memory: 128Mi
          cpu: 50m

      env:
        - name: configMapNamespace
          value: "$(params.configMapNamespace)"
        - name: configMapName
          value: "$(params.configMapName)"

      script: |
        #!/bin/bash
        set -euo pipefail

        # Default value is "false"
        keylessSigningEnabled="false"

        # Default values are empty strings
        defaultOIDCIssuer=""
        buildIdentityRegexp=""
        tektonChainsIdentity=""
        fulcioUrl=""
        rekorUrl=""
        tufUrl=""

        # Read from the ConfigMap
        echo "Reading ConfigMap ${configMapNamespace}/${configMapName}"
        KFLX_CONFIG_PATH='/tmp/cluster-config.json'

        if kubectl get configmap "${configMapName}" -n "${configMapNamespace}" -o json --ignore-not-found > "${KFLX_CONFIG_PATH}"; then
          if [ -s "${KFLX_CONFIG_PATH}" ]; then
            echo "ConfigMap found, extracting keyless signing parameters"

            # First we read "keylessSigningEnabled"
            keylessSigningEnabled=$(jq -r '.data.enableKeylessSigning // "false"' "$KFLX_CONFIG_PATH")

            if [ "$keylessSigningEnabled" = "true" ]; then
              # If that is set to "true" then read the other values
              defaultOIDCIssuer=$(jq -r '.data.defaultOIDCIssuer // ""' "$KFLX_CONFIG_PATH")
              buildIdentityRegexp=$(jq -r '.data.buildIdentityRegexp // ""' "$KFLX_CONFIG_PATH")
              tektonChainsIdentity=$(jq -r '.data.tektonChainsIdentity // ""' "$KFLX_CONFIG_PATH")

              # For each of these we prefer the internal url if its present
              fulcioUrl=$(jq -r '.data.fulcioInternalUrl // ""' "$KFLX_CONFIG_PATH")
              if [ -z "$fulcioUrl" ]; then
                fulcioUrl=$(jq -r '.data.fulcioExternalUrl // ""' "$KFLX_CONFIG_PATH")
              fi

              rekorUrl=$(jq -r '.data.rekorInternalUrl // ""' "$KFLX_CONFIG_PATH")
              if [ -z "$rekorUrl" ]; then
                rekorUrl=$(jq -r '.data.rekorExternalUrl // ""' "$KFLX_CONFIG_PATH")
              fi

              tufUrl=$(jq -r '.data.tufInternalUrl // ""' "$KFLX_CONFIG_PATH")
              if [ -z "$tufUrl" ]; then
                tufUrl=$(jq -r '.data.tufExternalUrl // ""' "$KFLX_CONFIG_PATH")
              fi

            else
              # Otherwise we ignore the rest of the ConfigMap
              echo "enableKeylessSigning is not set, using default empty values"

            fi
          else
            # Because we used --ignore-not-found this doesn't produce an error
            echo "ConfigMap not found, using default empty values"

          fi

        else
          # Some error other than "not found"
          # (Stderr from kubectl should be visible in the task log.)
          echo "Problem reading ConfigMap, using default empty values"

        fi

        # Write to task results
        echo -n "$keylessSigningEnabled" > "$(results.keylessSigningEnabled.path)"
        echo -n "$defaultOIDCIssuer" > "$(results.defaultOIDCIssuer.path)"
        echo -n "$buildIdentityRegexp" > "$(results.buildIdentityRegexp.path)"
        echo -n "$tektonChainsIdentity" > "$(results.tektonChainsIdentity.path)"
        echo -n "$fulcioUrl" > "$(results.fulcioUrl.path)"
        echo -n "$rekorUrl" > "$(results.rekorUrl.path)"
        echo -n "$tufUrl" > "$(results.tufUrl.path)"

        # Output for troubleshooting/debugging
        echo "results.keylessSigningEnabled: $keylessSigningEnabled"
        echo "results.defaultOIDCIssuer: $defaultOIDCIssuer"
        echo "results.buildIdentityRegexp: $buildIdentityRegexp"
        echo "results.tektonChainsIdentity: $tektonChainsIdentity"
        echo "results.fulcioUrl: $fulcioUrl"
        echo "results.rekorUrl: $rekorUrl"
        echo "results.tufUrl: $tufUrl"
