---
name: Checks

"on":
  pull_request:
    branches:
      - main
      - release-*
  push:
    branches:
      - main
      - release-*
  workflow_dispatch:

permissions:
  contents: read

jobs:

  Test:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit
          disable-telemetry: true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Needed in hack/derive-version.sh
          fetch-depth: 0

      - name: Restore Cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          key: main
          path: '**'

      - name: Setup Go environment
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Check go versions
        uses: conforma/github-workflows/golang-version-check@main

      - name: Show git sha and commit subject
        run: git log --oneline -n1

      - name: Generate
        run: make generate

      # Possibly useful for debugging if the next step produces an error
      - name: Show diff after `make generate`
        run: git diff --stat --patch

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code -s; then
            for f in $(git diff --exit-code --name-only); do
              echo "::error file=$f,line=1,col=1,endColumn=1::File was modified in build"
            done
            exit 1
          fi

      - name: Test
        run: make test

      - name: Upload test coverage artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-test
          path: |
            ./coverage-unit.out
            ./coverage-generative.out
            ./coverage-integration.out
          retention-days: 1

  Acceptance:
    runs-on: ubuntu-latest
    steps:
      # Disabled until we figure out the "Could not resolve host: github.com" in
      # acceptance tests
      # - name: Harden Runner
      #   uses: step-security/harden-runner@4d991eb9b905ef189e4c376166672c3f2f230481 # v2.11.0
      #   with:
      #     egress-policy: audit
      #     disable-telemetry: true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache Go build and module artifacts
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-acceptance-${{ runner.os }}-${{ hashFiles('go.sum', 'tools/go.sum', 'tools/kubectl/go.sum') }}
          restore-keys: |
            go-acceptance-${{ runner.os }}-

      - name: Setup Go environment
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install tkn CLI
        run: |
          TKN_VERSION=$(grep 'tektoncd/cli' tools/go.mod | awk '{print $2}' | sed 's/^v//')
          TKN_TARBALL="tkn_${TKN_VERSION}_Linux_x86_64.tar.gz"
          curl -fsSL "https://github.com/tektoncd/cli/releases/download/v${TKN_VERSION}/checksums.txt" -o checksums.txt
          curl -fsSL "https://github.com/tektoncd/cli/releases/download/v${TKN_VERSION}/${TKN_TARBALL}" -o "${TKN_TARBALL}"
          grep "${TKN_TARBALL}" checksums.txt | sha256sum -c -
          sudo tar xzf "${TKN_TARBALL}" -C /usr/local/bin tkn
          rm -f "${TKN_TARBALL}" checksums.txt

      - name: Install kubectl
        run: |
          KUBECTL_VERSION=$(grep 'k8s.io/kubernetes' tools/kubectl/go.mod | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          curl -fsSL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl" -o kubectl
          curl -fsSL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256" -o kubectl.sha256
          echo "$(cat kubectl.sha256)  kubectl" | sha256sum -c -
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
          rm -f kubectl kubectl.sha256

      - name: Update podman
        run: |
          "${GITHUB_WORKSPACE}/hack/ubuntu-podman-update.sh"

      - name: Show git sha and commit subject
        run: git log --oneline -n1

      - name: Acceptance test
        id: acceptance_test
        run: E2E_INSTRUMENTATION=true make acceptance

      - name: Upload acceptance coverage artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-acceptance
          path: ./coverage-acceptance.out
          retention-days: 1

  Upload:
    name: "Upload Coverage Statistics"
    runs-on: ubuntu-latest
    needs: [Test, Acceptance]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit
          disable-telemetry: true

        # checkout is required for codecov to map the coverage data back to files in the repo
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download test coverage artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: coverage-test
          path: ./coverage

      - name: Download acceptance coverage artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: coverage-acceptance
          path: ./coverage

      - name: Upload unit test coverage report
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage/coverage-unit.out
          disable_search: true
          flags: unit

      - name: Upload generative test coverage report
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage/coverage-generative.out
          disable_search: true
          flags: generative

      - name: Upload integration test coverage report
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage/coverage-integration.out
          disable_search: true
          flags: integration

      - name: Upload acceptance test coverage report
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage/coverage-acceptance.out
          disable_search: true
          flags: acceptance

  Tools:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore Cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          key: main
          path: '**'

      - name: Setup Go environment
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Development tools can be run
        run: |
          go run -modfile tools/go.mod github.com/tektoncd/cli/cmd/tkn version
          go run -modfile tools/go.mod sigs.k8s.io/kustomize/kustomize/v5 version
          go run -modfile tools/go.mod helm.sh/helm/v3/cmd/helm version
          go run -modfile tools/go.mod github.com/open-policy-agent/conftest --version
